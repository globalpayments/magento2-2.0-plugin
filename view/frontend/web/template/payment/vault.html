<div class="payment-method" css="'_active': (getId() === isChecked())" id="payment-method-globalpayments-cc-vault">
    <div class="payment-method-title field choice">
        <input type="radio"
               name="payment[method]"
               class="radio"
               data-bind="
                    attr: {'id': getId()},
                    value: getId(),
                    click: selectPaymentMethod,
                    checked: isChecked,
                    visible: isRadioButtonVisible()"/>
        <label class="label" data-bind="attr: {'for': getId()}">
            <img data-bind="attr: {
            'src': getIcons(getCardType()).url,
            'width': getIcons(getCardType()).width,
            'height': getIcons(getCardType()).height
            }" class="payment-icon">
            <span translate="'ending in'"></span>
            <span text="getMaskedCard()"></span>
            (
            <span translate="'expires'"></span>
            <span text="getExpirationDate()"></span>
            )
            <!-- ko if: enableInstallment() && defaultCountry() === 'MX' && baseCurrency() === 'MXN' -->
            <div class="field-tooltip toggle">
                <span class="field-tooltip-action action-help"
                      tabindex="0"
                      data-toggle="dropdown"
                      data-bind="mageInit: {'dropdown':{'activeClass': '_active'}}">
                </span>
                <div class="field-tooltip-content" data-target="dropdown">
                    <span translate="'For card-based installment payment options, please enter your card information below.'"></span>
                </div>
            </div>
            <!-- /ko -->
        </label>
    </div>

    <div class="payment-method-content">
        <each args="getRegion('messages')" render=""></each>

        <div class="checkout-agreements-block">
            <!-- ko foreach: $parent.getRegion('before-place-order') -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!--/ko-->
        </div>
        <div class="actions-toolbar">
            <div class="primary">
                <button class="action primary checkout"
                        type="submit"
                        data-bind="
                            click: handleVaultPlaceOrder,
                            attr: {title: $t('Place Order')}">
                    <span translate="'Place Order'"></span>
                </button>
            </div>
        </div>
    </div>
</div>
